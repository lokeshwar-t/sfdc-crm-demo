{% extends "base.html" %}
{% block title %}Products{% endblock %}
{% block content %}
<h1 class="page-title mb-3">Products</h1>
<div class="row g-3">
  {% for p in rows %}
  <div class="col-md-6 col-xl-4">
    <div class="card section-card h-100 kpi-card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div class="kpi-icon bg-primary-subtle text-primary mb-3"><i class="fa-solid fa-cube"></i></div>
          <span class="badge text-bg-light">{{ p.category }}</span>
        </div>
        <h6 class="fw-semibold">{{ p.name }}</h6>
        <div class="small text-muted mb-3">{{ p.description }}</div>
        <div class="d-flex justify-content-between">
          <div><div class="kpi-label">List Price</div><div class="fw-bold">{{ p.list_price|money }}/yr</div></div>
          <div class="text-end"><div class="kpi-label">Closed Won Revenue</div><div class="fw-bold text-success">{{ rev.get(p.id, 0)|money }}</div></div>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
