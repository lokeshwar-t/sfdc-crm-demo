# Render.com blueprint — deploy with one click via "New + → Blueprint"
# pointed at this repo. Free tier; SQLite lives on the instance's ephemeral
# disk and re-seeds automatically if the instance is recycled.
services:
  - type: web
    name: cloudvision-crm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong random value
      - key: AGENT_API_TOKEN
        generateValue: true          # rotate the agent API token off the demo default
      - key: PYTHON_VERSION
        value: "3.12.6"
      # --- Refold (Cobalt) workflow secrets — enter values in the Render dashboard ---
      - key: REFOLD_API_KEY
        sync: false                  # Cobalt X-API-Key — set in dashboard, never in git
      - key: REFOLD_LINKED_ACCOUNT_ID
        sync: false                  # Cobalt linked_account_id — set in dashboard
      # Non-secret defaults; uncomment to override the values baked into config.py
      # - key: REFOLD_API_BASE
      #   value: "https://cobalt-skc.uscentral1.gocobalt.io"
      # - key: REFOLD_MEETING_PREP_WORKFLOW_ID
      #   value: "6a5f73903284520f7515020f"
      # - key: REFOLD_MEETING_PREP_SLUG
      #   value: "Coba-8517"
