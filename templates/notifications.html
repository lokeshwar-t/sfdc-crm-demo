{% extends "base.html" %}
{% block title %}Notifications{% endblock %}
{% block content %}
<h1 class="page-title mb-3">Notifications</h1>
<div class="card section-card" style="max-width:760px">
  <div class="card-body p-0">
    {% for n in rows %}
    <a href="{{ n.link or '#' }}" class="dropdown-item notif-item py-3 border-bottom">
      <span class="notif-cat cat-{{ n.category|lower }}"><i class="fa-solid fa-{{ {'Renewal':'rotate','Contract':'file-contract','Health':'heart-pulse','Deal':'bullseye','Task':'list-check','Meeting':'calendar-days','Activity':'bolt'}.get(n.category,'bell') }}"></i></span>
      <span>
        <span class="small d-block">{{ n.message }}</span>
        <span class="text-muted" style="font-size:11.5px">{{ n.category }} · {{ n.created_at.strftime('%b %d, %I:%M %p') }}</span>
      </span>
    </a>
    {% else %}
    <div class="p-4 text-muted">You're all caught up.</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
